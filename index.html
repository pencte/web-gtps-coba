<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS Monitor</title>

<style>
body {
  background: #f5f5f5;
  font-family: Arial;
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

/* CARD */
.card {
  background: white;
  width: 400px;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* STATUS BULAT */
.status-circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: green;
  box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
}

/* TITLE */
.title {
  font-size: 20px;
  font-weight: bold;
}

/* STATUS TEXT */
.status-text {
  margin-top: 5px;
  font-size: 14px;
  background: #e6f4ea;
  padding: 3px 8px;
  border-radius: 10px;
  display: inline-block;
}

/* BANNER */
.banner {
  margin-top: 15px;
  width: 100%;
  height: 120px;
  border-radius: 15px;
  background: url('banner.png') center/cover no-repeat;
}

/* BUTTON + ONLINE */
.row {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

/* JOIN BUTTON */
.join-btn {
  background: #f0f0f0;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* ONLINE BOX */
.online-box {
  background: #f0f0f0;
  padding: 10px 15px;
  border-radius: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  background: #f8f8f8;
  padding: 10px;
  border-radius: 10px;
}

.stat {
  text-align: center;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="card">

  <!-- HEADER -->
  <div class="header">
    <div id="circle" class="status-circle"></div>
    <div>
      <div class="title">Bonner Pam</div>
      <div id="status" class="status-text">UP</div>
    </div>
  </div>

  <!-- BANNER -->
  <div class="banner"></div>

  <!-- BUTTON + ONLINE -->
  <div class="row">
    <div class="join-btn">JOIN SERVER</div>
    <div class="online-box"><span id="players">0</span> online</div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      🌍<br><span id="worlds">0</span><br>Worlds
    </div>
    <div class="stat">
      👤<br><span id="accounts">0</span><br>Accounts
    </div>
    <div class="stat">
      🛡<br><span id="guilds">0</span><br>Guilds
    </div>
  </div>

</div>

<script>
async function load() {
  const res = await fetch("/api/status");
  const data = await res.json();

  const circle = document.getElementById("circle");
  const status = document.getElementById("status");

  if (data.status === "online") {
    circle.style.background = "green";
    status.innerText = "UP";
  } else {
    circle.style.background = "red";
    status.innerText = "DOWN";
  }

  document.getElementById("players").innerText = data.players;
  
  // kalau belum ada di bot, kasih default
  document.getElementById("worlds").innerText = data.worlds || 1000;
  document.getElementById("accounts").innerText = data.accounts || 500;
  document.getElementById("guilds").innerText = data.guilds || 10;
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
