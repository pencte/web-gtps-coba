<!DOCTYPE html>
<html>
<head>
<title>TerorismePS</title>
<style>
body{background:#111;color:white;font-family:Arial;text-align:center}
.card{background:#1b1b1b;padding:20px;border-radius:15px;width:350px;margin:auto}
.banner{height:120px;background:url('/banner.png') center/cover;border-radius:10px}
</style>
</head>
<body>

<div class="card">

<h2>TerorismePS</h2>
<div class="banner"></div>

<p>Status: <span id="status"></span></p>
<p>Players: <span id="players"></span></p>

<input id="pass" placeholder="owner password">
<button onclick="login()">Login</button>

<div id="owner" style="display:none">
<p>CPU: <span id="cpu"></span></p>
<p>RAM: <span id="ram"></span></p>
</div>

</div>

<script>
async function load(){
 const r=await fetch('/api/status');
 const d=await r.json();
 status.innerText=d.status;
 players.innerText=d.players;
}
setInterval(load,3000);load();

async function login(){
 const r=await fetch('/api/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({password:pass.value})
 });
 if(r.ok){
  const d=await fetch('/api/admin').then(r=>r.json());
  owner.style.display='block';
  cpu.innerText=d.cpu+"%";
  ram.innerText=d.ram.used+"GB";
 }
}
</script>

</body>
</html>
