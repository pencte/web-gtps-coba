<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TerorismePS</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  margin-top:50px;
}

.card {
  width:350px;
  background:#1b1b1b;
  padding:20px;
  border-radius:15px;
  position:relative;
}

.banner {
  height:120px;
  background:url('/banner.png') center/cover;
  border-radius:10px;
}

/* MENU */
.menu-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:18px;
}

.stats {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.stat {
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="card">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<h2 style="text-align:center;">TerorismePS</h2>

<div class="banner"></div>

<p>Status: <span id="status"></span></p>
<p>Players: <span id="players"></span></p>

<div class="stats">
  <div class="stat">🌍<br><span id="worlds">0</span></div>
  <div class="stat">👤<br><span id="accounts">0</span></div>
  <div class="stat">🛡<br><span id="guilds">0</span></div>
</div>

<!-- OWNER PANEL -->
<div id="ownerPanel" style="display:none;">
  <div class="stats">
    <div class="stat">⚡<br><span id="cpu">0</span></div>
    <div class="stat">🧠<br><span id="ram">0</span></div>
  </div>
</div>

</div>

<script>
async function load() {
  const res = await fetch("/api/status");
  const d = await res.json();

  status.innerText = d.status;
  players.innerText = d.players;
  worlds.innerText = d.worlds;
  accounts.innerText = d.accounts;
  guilds.innerText = d.guilds;
}
setInterval(load,3000);
load();

function toggleMenu() {
  const pass = prompt("Owner password:");

  if (pass === "admin123") {
    ownerPanel.style.display = "block";
    loadOwner();
  } else {
    alert("Wrong password");
  }
}

async function loadOwner() {
  const res = await fetch("/api/status");
  const d = await res.json();

  cpu.innerText = d.cpu + "%";
  ram.innerText = d.ram.used + " GB";
}
</script>

</body>
</html>
