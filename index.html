<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TerorismePS</title>

<style>
:root {
  --bg: #111;
  --card: #1b1b1b;
  --text: #fff;
}

.light {
  --bg: #f2f2f2;
  --card: #ffffff;
  --text: #000;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.card {
  width: 350px;
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
}

/* BANNER */
.banner {
  height: 120px;
  background: url('/banner.png') center/cover;
  border-radius: 10px;
  position: relative;
}

/* MENU (NEMPEL BANGET DI POJOK) */
.menu-btn {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 16px;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
  padding: 3px 7px;
  border-radius: 6px;
}

/* STATUS BOX */
.status-box {
  width: 10px;
  height: 10px;
  display: inline-block;
  border-radius: 2px;
  margin-right: 6px;
}

/* STATS (INI BIAR SAMA KAYAK LU) */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.stat {
  text-align: center;
  font-size: 12px;
}

/* BUTTON */
.btn {
  margin-top: 10px;
  padding: 8px;
  background: #333;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">

<h2 style="text-align:center;">TerorismePS</h2>

<div class="banner">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- STATUS (INI YG DITAMBAH TAPI GAK NGERUSAK) -->
<p>
  <span id="statusBox" class="status-box"></span>
  <span id="status"></span>
</p>

<p>Players: <span id="players"></span></p>

<div class="stats">
  <div class="stat">🌍<br><span id="worlds">0</span></div>
  <div class="stat">👤<br><span id="accounts">0</span></div>
  <div class="stat">🛡<br><span id="guilds">0</span></div>
</div>

<!-- OWNER PANEL (HIDDEN) -->
<div id="ownerPanel" style="display:none;">
  <div class="stats">
    <div class="stat">⚡<br><span id="cpu">0</span></div>
    <div class="stat">🧠<br><span id="ram">0</span></div>
  </div>
</div>

<div class="btn" onclick="toggleTheme()">🌙 / ☀ Mode</div>

</div>

<script>
async function load() {
  const res = await fetch("/api/status");
  const d = await res.json();

  status.innerText = d.status;

  // KOTAK STATUS
  if (d.status === "online") {
    statusBox.style.background = "lime";
  } else {
    statusBox.style.background = "red";
  }

  players.innerText = d.players;
  worlds.innerText = d.worlds;
  accounts.innerText = d.accounts;
  guilds.innerText = d.guilds;
}
setInterval(load,3000);
load();

// MENU OWNER
function toggleMenu() {
  const pass = prompt("Owner password:");

  if (pass === "admin123") {
    ownerPanel.style.display = "block";
    loadOwner();
  } else {
    alert("Wrong password");
  }
}

// LOAD OWNER
async function loadOwner() {
  const res = await fetch("/api/status");
  const d = await res.json();

  cpu.innerText = d.cpu + "%";
  ram.innerText = d.ram.used + " GB";
}

// DARK MODE
function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
