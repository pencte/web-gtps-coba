<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTPS Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.status {
  padding: 10px 20px;
  border-radius: 10px;
  display: inline-block;
  margin: 10px;
}

.up { background: #22c55e; }
.down { background: #ef4444; }

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
  <h1 id="serverName">Loading...</h1>
  <div id="status" class="status">Checking...</div>

  <div class="card">Online: <span id="online">0</span></div>
  <div class="card">Worlds: <span id="worlds">0</span></div>
  <div class="card">Accounts: <span id="accounts">0</span></div>

  <button onclick="joinDiscord()">Join Discord</button>
</div>

<script>
let joinLink = "";

// 🔥 GANTI INI KE IP VPS LU
const API_URL = "http://IP-VPS:3000/status";

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById('serverName').innerText = data.server_name;
    document.getElementById('online').innerText = data.online;
    document.getElementById('worlds').innerText = data.worlds;
    document.getElementById('accounts').innerText = data.accounts;

    const statusEl = document.getElementById('status');
    statusEl.innerText = data.status;

    if (data.status === 'UP') {
      statusEl.className = 'status up';
    } else {
      statusEl.className = 'status down';
    }

    joinLink = data.join_link;

  } catch (e) {
    document.getElementById('status').innerText = 'ERROR';
  }
}

function joinDiscord() {
  if (joinLink) {
    window.location.href = joinLink;
  }
}

// 🔥 refresh real-time
setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
