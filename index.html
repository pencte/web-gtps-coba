<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS</title>

<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --soft: #f0f0f0;
}

.dark {
  --bg: #0f1115;
  --card: #161b22;
  --text: #e6edf3;
  --soft: #21262d;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  display: flex;
  justify-content: center;
  margin-top: 50px;
  transition: 0.3s;
}

/* CARD */
.card {
  background: var(--card);
  width: 400px;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  position: relative;
}

/* STATUS BOX */
.status-box {
  width: 15px;
  height: 15px;
  border-radius: 4px;
  position: absolute;
  top: 15px;
  left: 15px;
}

/* TITLE CENTER */
.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* STATUS TEXT */
.status-text {
  text-align: center;
  font-size: 13px;
  margin-bottom: 10px;
}

/* BANNER */
.banner {
  width: 100%;
  height: 130px;
  border-radius: 15px;
  background: url('/banner.png') center/cover no-repeat;
}

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

/* BUTTON */
.join-btn {
  background: var(--soft);
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.join-btn:hover {
  opacity: 0.8;
}

/* ONLINE */
.online-box {
  background: var(--soft);
  padding: 10px 15px;
  border-radius: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  background: var(--soft);
  padding: 10px;
  border-radius: 10px;
}

.stat {
  text-align: center;
  font-size: 12px;
}

/* TOGGLE */
.toggle {
  position: absolute;
  top: 15px;
  right: 15px;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="card">

  <div id="statusBox" class="status-box"></div>

  <div class="toggle" onclick="toggleMode()">🌓</div>

  <div class="title">TerorismePS</div>
  <div id="statusText" class="status-text">-</div>

  <div class="banner"></div>

  <div class="row">
    <div class="join-btn" onclick="join()">JOIN SERVER</div>
    <div class="online-box"><span id="players">0</span> online</div>
  </div>

  <div class="stats">
    <div class="stat">🌍<br><span id="worlds">0</span><br>Worlds</div>
    <div class="stat">👤<br><span id="accounts">0</span><br>Accounts</div>
    <div class="stat">🛡<br><span id="guilds">0</span><br>Guilds</div>
  </div>

</div>

<script>
// 🔥 GANTI LINK WA LU DISINI
function join() {
  window.open("https://wa.me/628XXXXXXXXXX", "_blank");
}

// DARK MODE
function toggleMode() {
  document.body.classList.toggle("dark");
}

// LOAD DATA
async function load() {
  const res = await fetch("/api/status");
  const data = await res.json();

  const box = document.getElementById("statusBox");
  const text = document.getElementById("statusText");

  if (data.status === "online") {
    box.style.background = "#3fb950";
    text.innerText = "SERVER ONLINE";
  } else {
    box.style.background = "#f85149";
    text.innerText = "SERVER OFFLINE";
  }

  document.getElementById("players").innerText = data.players;

  document.getElementById("worlds").innerText = data.worlds || 1000;
  document.getElementById("accounts").innerText = data.accounts || 500;
  document.getElementById("guilds").innerText = data.guilds || 10;
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
