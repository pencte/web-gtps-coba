<!DOCTYPE html>
<html>
<head>
  <title>GTPS MONITOR</title>
  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .card {
      background: #161b22;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🔥 TERORISMEPS MONITOR</h1>

<div class="card">
  <h2 id="status">Loading...</h2>
  <p>👥 Player: <span id="player"></span></p>
  <p>⚡ CPU: <span id="cpu"></span>%</p>
  <p>🧠 RAM: <span id="ram"></span></p>
</div>

<div class="card">
  <h3>🌏 Ping Asia</h3>
  <p>SG: <span id="sg"></span> ms</p>
  <p>ID: <span id="id"></span> ms</p>
  <p>JP: <span id="jp"></span> ms</p>
  <p>IN: <span id="in"></span> ms</p>
</div>

<script>
async function load() {
  try {
    const res = await fetch("/api/status");
    const data = await res.json();

    document.getElementById("status").innerText = data.status?.toUpperCase();
    document.getElementById("player").innerText = data.players;
    document.getElementById("cpu").innerText = data.cpu;
    document.getElementById("ram").innerText = data.ram?.used + " / " + data.ram?.total + " GB";

    document.getElementById("sg").innerText = data.ping?.SG;
    document.getElementById("id").innerText = data.ping?.ID;
    document.getElementById("jp").innerText = data.ping?.JP;
    document.getElementById("in").innerText = data.ping?.IN;

  } catch {
    document.getElementById("status").innerText = "ERROR";
  }
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
